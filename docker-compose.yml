services:

  postgres:
    image: postgres:16-alpine
    container_name: reliable-job-queue-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Naveen
      POSTGRES_DB: jobQueue

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: reliable-job-queue-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend

    container_name: reliable-job-queue-backend

    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend

    container_name: reliable-job-queue-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: